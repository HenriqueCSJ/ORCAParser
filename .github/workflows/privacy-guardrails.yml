name: Privacy Guardrails

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  blocked-artifact-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify no blocked private artifacts are tracked
        run: python tools/check_tracked_private_artifacts.py --repo-root .
